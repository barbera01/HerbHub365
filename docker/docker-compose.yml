services:
  llm-service:
    build:
      context: ../services/llm-service
      dockerfile: dockerfile
    container_name: llm-service
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      LLM_SERVICE_LISTEN_ADDR: ${LLM_SERVICE_LISTEN_ADDR:-:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama.la.home-cloud.uk}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:latest}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.6}
      LLM_TOP_P: ${LLM_TOP_P:-0.9}
      LLM_REPEAT_PENALTY: ${LLM_REPEAT_PENALTY:-1.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-10000}
      LLM_REQUEST_TIMEOUT: ${LLM_REQUEST_TIMEOUT:-20m}
      LLM_DEBUG: ${LLM_DEBUG:-false}

  blog-poster:
    build:
      context: ../services/blog-poster
      dockerfile: dockerfile
    container_name: blog-poster
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      BLOG_POSTER_MODE: ${BLOG_POSTER_MODE:-daemon}
      BLOG_GENERATE_SCHEDULE: ${BLOG_GENERATE_SCHEDULE:-5 0 * * *}
      BLOG_GENERATE_PERIOD_MODE: ${BLOG_GENERATE_PERIOD_MODE:-auto}
      BLOG_GENERATE_SPLIT_HOUR: ${BLOG_GENERATE_SPLIT_HOUR:-12}
      BLOG_TARGET_DATE: ${BLOG_TARGET_DATE:-yesterday}
      RABBITMQ_URL: ${BLOG_POSTER_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_QUEUE: ${BLOG_POSTER_RABBITMQ_QUEUE:-sensor.snapshots}
      LLM_SERVICE_URL: ${BLOG_POSTER_LLM_SERVICE_URL:-http://llm-service:8080}
      LLM_SERVICE_TIMEOUT: ${BLOG_POSTER_LLM_SERVICE_TIMEOUT:-20m}
      GIT_PUBLISH_ENABLED: ${BLOG_POSTER_GIT_PUBLISH_ENABLED:-false}
      GIT_REPO_DIR: /repo
      GIT_REMOTE_NAME: ${BLOG_POSTER_GIT_REMOTE_NAME:-origin}
      GIT_PUSH_BRANCH: ${BLOG_POSTER_GIT_PUSH_BRANCH:-origin/main}
      GIT_PAT: ${BLOG_POSTER_GIT_PAT:-}
      GIT_AUTHOR_NAME: ${BLOG_POSTER_GIT_AUTHOR_NAME:-Herb Hub Bot}
      GIT_AUTHOR_EMAIL: ${BLOG_POSTER_GIT_AUTHOR_EMAIL:-bot@herbhub365.com}
      HUB_DIR: /repo/hub
      BLOG_POSTS_DIR: /repo/hub/_posts
      BLOG_DRAFTS_DIR: /repo/hub/_drafts
      BLOG_REPO_POST_PROMPT: ${BLOG_REPO_POST_PROMPT:-}
      BLOG_REPO_POST_TITLE: ${BLOG_REPO_POST_TITLE:-}
      BLOG_REPO_POST_PATHS: ${BLOG_REPO_POST_PATHS:-}
      BLOG_REPO_POST_DRAFT: ${BLOG_REPO_POST_DRAFT:-true}
      BLOG_REPO_POST_CATEGORIES: ${BLOG_REPO_POST_CATEGORIES:-Platform Update}
      BLOG_REPO_POST_MAX_FILES: ${BLOG_REPO_POST_MAX_FILES:-12}
      BLOG_REPO_POST_MAX_FILE_BYTES: ${BLOG_REPO_POST_MAX_FILE_BYTES:-12000}
      BLOG_REPO_POST_MAX_TOTAL_BYTES: ${BLOG_REPO_POST_MAX_TOTAL_BYTES:-48000}
      PROM_POST_BASE_URL: ${PROM_POST_BASE_URL:-https://prometheus.home-cloud.uk}
      PROM_POST_PATH: ${PROM_POST_PATH:-/api/v1/query_range}
      PROM_POST_QUERY_FILE: ${PROM_POST_QUERY_FILE:-/repo/services/blog-poster/config/prom-queries.json}
      PROM_POST_RANGE: ${PROM_POST_RANGE:-24h}
      PROM_POST_STEP: ${PROM_POST_STEP:-5m}
      PROM_POST_TIMEOUT: ${PROM_POST_TIMEOUT:-30s}
      PROM_POST_SCHEDULE: ${PROM_POST_SCHEDULE:-0 23 * * *}
      PROM_POST_TARGET_DATE: ${PROM_POST_TARGET_DATE:-today}
      PROM_POST_DRAFT: ${PROM_POST_DRAFT:-false}
      PROM_POST_CATEGORIES: ${PROM_POST_CATEGORIES:-Metrics Observability}
      PROM_POST_LAYOUT: ${PROM_POST_LAYOUT:-post}
      PROM_POST_EXPORT_DIR: ${PROM_POST_EXPORT_DIR:-/repo/hub/assets/data/prometheus}
      BLOG_INCLUDE_DAY_IMAGE: ${BLOG_INCLUDE_DAY_IMAGE:-false}
      BLOG_IMAGE_SOURCE_DIR: /timelapse
      BLOG_IMAGE_OUTPUT_DIR: /repo/hub/assets/images/blog
      BLOG_IMAGE_PUBLIC_PATH: /assets/images/blog
      DATA_DIR: /data
      SENSOR_DATA_ENABLED: ${SENSOR_DATA_ENABLED:-true}
      SENSOR_DATA_FILE: ${SENSOR_DATA_FILE:-/repo/hub/_data/live_sensors.yml}
      SENSOR_RESERVOIR_TEMP_KEY: ${SENSOR_RESERVOIR_TEMP_KEY:-water}
      SENSOR_MOISTURE_MONITOR_BELOW: ${SENSOR_MOISTURE_MONITOR_BELOW:-65}
      SENSOR_MOISTURE_ALERT_BELOW: ${SENSOR_MOISTURE_ALERT_BELOW:-30}
      SENSOR_HERB_NAMES: ${SENSOR_HERB_NAMES:-basil:Basil,chilli:Chilli,oregano:Oregano}
      SENSOR_HERB_ICONS: ${SENSOR_HERB_ICONS:-basil:basil,chilli:chilli,oregano:oregano}
    volumes:
      - ..:/repo
      - ../services/blog-poster/data:/data
      - ${BLOG_POSTER_IMAGE_SOURCE_PATH:-/mnt/hh01-timelapse}:/timelapse:ro
    depends_on:
      - llm-service

  tts-narrator:
    build:
      context: ../services/tts-narrator
      dockerfile: dockerfile
    container_name: tts-narrator
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      TTS_MODE: ${TTS_MODE:-daemon}
      TTS_SCHEDULE: ${TTS_SCHEDULE:-10 0 * * *}
      TTS_RUN_ON_START: ${TTS_RUN_ON_START:-false}
      TTS_TARGET_DATE: ${TTS_TARGET_DATE:-yesterday}
      TTS_TARGET_SLUG: ${TTS_TARGET_SLUG:-}
      TTS_BASE_URL: ${TTS_BASE_URL:-https://kokoro-api.lab.home-cloud.uk/v1/audio/speech}
      TTS_MODEL: ${TTS_MODEL:-kokoro}
      TTS_VOICE: ${TTS_VOICE:-eve}
      TTS_SPEED: ${TTS_SPEED:-0}
      TTS_FORMAT: ${TTS_FORMAT:-mp3}
      TTS_REQUEST_TIMEOUT: ${TTS_REQUEST_TIMEOUT:-120s}
      TTS_RULES_FILE: /app/config/tts-rules.json
      HUB_DIR: /repo/hub
      BLOG_POSTS_DIR: /repo/hub/_posts
      TTS_AUDIO_DIR: /repo/hub/assets/audio/blog
      TTS_AUDIO_PUBLIC_PATH: /assets/audio/blog
      GIT_PUBLISH_ENABLED: ${TTS_GIT_PUBLISH_ENABLED:-false}
      GIT_REPO_DIR: /repo
      GIT_REMOTE_NAME: ${TTS_GIT_REMOTE_NAME:-origin}
      GIT_PUSH_BRANCH: ${TTS_GIT_PUSH_BRANCH:-origin/main}
      GIT_PAT: ${TTS_GIT_PAT:-}
      GIT_AUTHOR_NAME: ${TTS_GIT_AUTHOR_NAME:-Herb Hub Bot}
      GIT_AUTHOR_EMAIL: ${TTS_GIT_AUTHOR_EMAIL:-bot@herbhub365.com}
    volumes:
      - ..:/repo

  herbhub-manager:
    build:
      context: ../services/herbhub-manager
      dockerfile: Dockerfile
    container_name: herbhub-manager
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      LISTEN_ADDR: ${LISTEN_ADDR:-:8080}
      NARRATOR_URL: ${NARRATOR_URL:-https://video-narrator.lab.home-cloud.uk}
      HUB_DIR: ${HUB_DIR:-/repo/hub}
      BLOG_POSTS_DIR: ${BLOG_POSTS_DIR:-/repo/hub/_posts}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/mnt/herbhub-video/Video/Output}
      POLL_INTERVAL: ${POLL_INTERVAL:-3s}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-120s}
      LLM_SERVICE_URL: ${LLM_SERVICE_URL:-http://llm-service:8080}
      LLM_SERVICE_TIMEOUT: ${LLM_SERVICE_TIMEOUT:-25m}
      BLOG_SYSTEM_PROMPT: ${BLOG_SYSTEM_PROMPT:-}
      BLOG_SITE_NAME: ${BLOG_SITE_NAME:-HerbHub365}
      BLOG_SITE_URL: ${BLOG_SITE_URL:-https://herbhub365.com}
      BLOG_PLANT_NAME: ${BLOG_PLANT_NAME:-herbs}
    volumes:
      - ..:/repo
      - ${HERBHUB_VIDEO_OUTPUT_PATH:-/mnt/herbhub-video/Video/Output}:/mnt/herbhub-video/Video/Output
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.herbhub-manager.rule=Host(`manager.herbhub365.com`)"
      - "traefik.http.routers.herbhub-manager.entrypoints=websecure"
      - "traefik.http.routers.herbhub-manager.tls=true"
      - "traefik.http.services.herbhub-manager.loadbalancer.server.port=8080"

  video-narrator:
    build:
      context: ../services/video-narrator
      dockerfile: dockerfile
    container_name: video-narrator
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      VIDEO_MODE: ${VIDEO_MODE:-server}
      SERVER_LISTEN_ADDR: ${VIDEO_SERVER_LISTEN_ADDR:-:8080}
      HUB_DIR: ${HUB_DIR:-/repo/hub}
      BLOG_POSTS_DIR: ${BLOG_POSTS_DIR:-/repo/hub/_posts}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/mnt/herbhub-video/Video/Output}
      VIDEO_RULES_FILE: ${VIDEO_RULES_FILE:-/app/config/tts-rules.json}
      VIDEO_BASE_URL: ${VIDEO_BASE_URL:-http://172.16.106.81:8011}
      VIDEO_AVATAR: ${VIDEO_AVATAR:-eve}
      VIDEO_AVATARS: ${VIDEO_AVATARS:-eve}
      VIDEO_REQUEST_TIMEOUT: ${VIDEO_REQUEST_TIMEOUT:-120s}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://admin:yourpassword@rabbitmq:5672/}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-video.produced}
      CONCAT_ENABLED: ${CONCAT_ENABLED:-true}
      CONCAT_INTRO: ${CONCAT_INTRO:-/app/resources/video/intro.mp4}
      CONCAT_OUTRO: ${CONCAT_OUTRO:-/app/resources/video/outro.mp4}
      CHROMA_KEY_ENABLED: ${CHROMA_KEY_ENABLED:-false}
      CHROMA_KEY_BG_PATH: ${CHROMA_KEY_BG_PATH:-}
      CHROMA_KEY_BG_COLOR: ${CHROMA_KEY_BG_COLOR:-0x1a1a2e}
      CONCAT_THREADS: ${CONCAT_THREADS:-1}
    volumes:
      - ..:/repo
      - ${HERBHUB_VIDEO_OUTPUT_PATH:-/mnt/herbhub-video/Video/Output}:/mnt/herbhub-video/Video/Output
      - ${VIDEO_RESOURCES_PATH:-../services/video-narrator/resources/video}:/app/resources/video:ro
      - ${VIDEO_BG_RESOURCES_PATH:-../services/video-narrator/resources/video_backgrounds}:/app/resources/video_backgrounds:ro

  video-publisher:
    build:
      context: ../services/video-publisher
      dockerfile: dockerfile
    container_name: video-publisher
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://admin:yourpassword@rabbitmq:5672/}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-video.produced}
      RABBITMQ_DLQ: ${RABBITMQ_DLQ:-video.produced.dlq}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/mnt/herbhub-video/Video/Output}
      BLOG_POSTS_DIR: ${BLOG_POSTS_DIR:-/repo/hub/_posts}
      BLOG_BASE_URL: ${BLOG_BASE_URL:-}
      BLOG_POSTER_GIT_PUBLISH_ENABLED: ${BLOG_POSTER_GIT_PUBLISH_ENABLED:-false}
      BLOG_POSTER_GIT_REPO_DIR: ${BLOG_POSTER_GIT_REPO_DIR:-/repo}
      BLOG_POSTER_GIT_REMOTE_NAME: ${BLOG_POSTER_GIT_REMOTE_NAME:-origin}
      BLOG_POSTER_GIT_PUSH_BRANCH: ${BLOG_POSTER_GIT_PUSH_BRANCH:-origin/main}
      BLOG_POSTER_GIT_PAT: ${BLOG_POSTER_GIT_PAT:-}
      BLOG_POSTER_GIT_AUTHOR_NAME: ${BLOG_POSTER_GIT_AUTHOR_NAME:-Herb Hub Bot}
      BLOG_POSTER_GIT_AUTHOR_EMAIL: ${BLOG_POSTER_GIT_AUTHOR_EMAIL:-bot@herbhub365.com}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-/secrets/youtube/client_secret.json}
      YOUTUBE_TOKEN: ${YOUTUBE_TOKEN:-/secrets/youtube/token.json}
      YOUTUBE_PRIVACY: ${YOUTUBE_PRIVACY:-unlisted}
      YOUTUBE_MADE_FOR_KIDS: ${YOUTUBE_MADE_FOR_KIDS:-false}
      YOUTUBE_CONTAINS_SYNTHETIC_MEDIA: ${YOUTUBE_CONTAINS_SYNTHETIC_MEDIA:-true}
      YOUTUBE_CATEGORY_ID: ${YOUTUBE_CATEGORY_ID:-22}
      YOUTUBE_TAGS: ${YOUTUBE_TAGS:-}
    volumes:
      - ${HERBHUB_VIDEO_OUTPUT_PATH:-/mnt/herbhub-video/Video/Output}:/mnt/herbhub-video/Video/Output
      - /etc/youtube:/secrets/youtube
      - ..:/repo
    depends_on:
      - rabbitmq

  timelapse-builder:
    build:
      context: ..
      dockerfile: services/timelapse-builder/dockerfile
    container_name: timelapse-builder
    environment:
      TIMELAPSE_MODE: ${TIMELAPSE_MODE:-once}
      TIMELAPSE_INTERVAL_SECONDS: ${TIMELAPSE_INTERVAL_SECONDS:-3600}
      TIMELAPSE_FROM: ${TIMELAPSE_FROM:-}
      TIMELAPSE_TO: ${TIMELAPSE_TO:-}
      INPUT_DIR: /input
      OUTPUT_DIR: /output
      OUTPUT_NAME: ${TIMELAPSE_OUTPUT_NAME:-}
      INPUT_FPS: ${TIMELAPSE_INPUT_FPS:-8}
      OUTPUT_FPS: ${TIMELAPSE_OUTPUT_FPS:-30}
      CRF: ${TIMELAPSE_CRF:-23}
      MIN_BRIGHTNESS: ${TIMELAPSE_MIN_BRIGHTNESS:-0}
    volumes:
      - ${TIMELAPSE_INPUT_PATH:-/home/andy/Pictures/timelapse}:/input:ro
      - ${TIMELAPSE_OUTPUT_PATH:-../services/timelapse-builder/output}:/output

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - herbhub
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: yourpassword
    volumes:
      - ./rabbitmq:/var/lib/rabbitmq
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.rabbitmq.rule=Host("rabbit.herbhub365.com")'
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"

      - "traefik.tcp.routers.rabbitmq-amqp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.rabbitmq-amqp.entrypoints=amqp"
      - "traefik.tcp.services.rabbitmq-amqp.loadbalancer.server.port=5672"

  watering:
    build:
      context: ../services/watering
      dockerfile: dockerfile
    container_name: watering
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      SOIL_MOISTURE_THRESHOLD: ${WATERING_SOIL_MOISTURE_THRESHOLD:-40.0}
      RABBITMQ_URL: ${WATERING_RABBITMQ_URL:-amqp://admin:yourpassword@rabbitmq:5672/}
      METRICS_URL: ${WATERING_METRICS_URL:-http://hh-02:9100/metrics}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8787/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    depends_on:
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  dashboard:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: dashboard
    networks:
      - herbhub
    volumes:
      - ./dashboard:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock # (optional) For docker integrations, see alternative methods

    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.dashboard.rule=Host("dashboard.herbhub365.com")'
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  scheduler:
    image: cronicle/edge:v1.14.2
    command: manager
    hostname: main
    restart: always
    container_name: scheduler
    privileged: true
    networks:
      - herbhub
    volumes:
      - ./scheduler/config:/opt/cronicle/config
      - ./scheduler/data:/opt/cronicle/data
      - ./scheduler/plugins:/opt/cronicle/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    secrets:
      - source: scheduler_ssh_private_key
        target: scheduler_ssh_private_key
        mode: 0400
      - source: scheduler_ssh_known_hosts
        target: scheduler_ssh_known_hosts
        mode: 0444
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider localhost:3012/api/app/ping || exit 1",
        ]
      interval: 5s
      timeout: 1s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cronicle.rule=Host(`scheduler.herbhub365.com`)"
      - "traefik.http.routers.cronicle.entrypoints=websecure"
      - "traefik.http.routers.cronicle.tls=true"
      - "traefik.http.services.cronicle.loadbalancer.server.port=3012"

  traefik:
    image: docker.io/library/traefik:latest
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "5672:5672"
    networks:
      herbhub:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/traefik:/etc/traefik
      - /usr/share/certs/herbhub365:/etc/traefik/certs
    restart: unless-stopped
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - herbhub
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  prometheus-agent:
    image: prom/prometheus:latest
    container_name: prometheus-agent
    restart: unless-stopped
    networks:
      - herbhub
    command:
      - --config.file=/etc/prometheus/prometheus-agent.yml
      - --enable-feature=agent
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./monitoring/prometheus-agent.yml:/etc/prometheus/prometheus-agent.yml:ro
    depends_on:
      - cadvisor
networks:
  herbhub:
    external: true

secrets:
  scheduler_ssh_private_key:
    file: ./scheduler/secrets/id_ed25519
  scheduler_ssh_known_hosts:
    file: ./scheduler/secrets/known_hosts
