# docker-compose.gpu-narrator.yml
#
# Deploy ONLY the video-narrator service on a GPU machine.
# The output directory is an NFS mount shared with the main server so
# video-publisher can pick up finished MP4s without any file transfer step.
# Traffic is routed via Traefik on 443 at video-narrator.lab.home-cloud.uk.
#
# Usage:
#   docker compose -f docker-compose.gpu-narrator.yml up -d
#
# Required environment variables (set in .env or export before running):
#   RABBITMQ_URL          AMQP URL on the main server (e.g. amqp://admin:pass@192.168.1.10:5672/)
#   VIDEO_BASE_URL        URL of the MuseTalk API (e.g. http://localhost:8011)
#   NFS_OUTPUT_MOUNT      Local path of the shared video output directory
#                         (default: /mnt/herbhub-video/Video/Output)

services:
  video-narrator:
    build:
      context: ../services/video-narrator
      dockerfile: dockerfile
    container_name: video-narrator
    restart: unless-stopped
    runtime: nvidia
    networks:
      - aistack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.video-narrator.rule=Host(`video-narrator.lab.home-cloud.uk`)"
      - "traefik.http.routers.video-narrator.entrypoints=websecure"
      - "traefik.http.routers.video-narrator.tls=true"
      - "traefik.http.services.video-narrator.loadbalancer.server.port=8090"
    environment:
      VIDEO_MODE: ${VIDEO_MODE:-server}
      SERVER_LISTEN_ADDR: ${VIDEO_SERVER_LISTEN_ADDR:-:8090}

      # MuseTalk API — typically local on the GPU machine
      VIDEO_BASE_URL: ${VIDEO_BASE_URL:-http://localhost:8011}
      VIDEO_AVATAR: ${VIDEO_AVATAR:-rowan}
      VIDEO_AVATARS: ${VIDEO_AVATARS:-rowan}
      VIDEO_REQUEST_TIMEOUT: ${VIDEO_REQUEST_TIMEOUT:-120s}
      VIDEO_MAX_WAIT: ${VIDEO_MAX_WAIT:-40m}
      VIDEO_PIPELINE_BUFFER: ${VIDEO_PIPELINE_BUFFER:-15m}

      # Direct TTS API used by timelapse narration.
      TTS_BASE_URL: ${TTS_BASE_URL:-https://kokoro-api.lab.home-cloud.uk/v1/audio/speech}
      TTS_MODEL: ${TTS_MODEL:-kokoro}
      TTS_VOICE: ${TTS_VOICE:-eve}
      TTS_SPEED: ${TTS_SPEED:-0}
      TTS_FORMAT: ${TTS_FORMAT:-mp3}

      # Posts dir not required — herbhub-video sends post text inline.
      # Set to a dummy path; the server will simply not use it.
      HUB_DIR: /dev/null
      BLOG_POSTS_DIR: /dev/null

      # Output: write finished MP4s to the NFS mount.
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/mnt/herbhub-video/Video/Output}

      # ffmpeg concat — NVENC hardware encoding on RTX 3060.
      # Preset p4 = balanced quality/speed. CRF maps to -cq for NVENC.
      CONCAT_ENABLED: ${CONCAT_ENABLED:-true}
      CONCAT_INTRO: ${CONCAT_INTRO:-/app/resources/video/intro.mp4}
      CONCAT_OUTRO: ${CONCAT_OUTRO:-/app/resources/video/outro.mp4}
      CONCAT_VIDEO_CODEC: ${CONCAT_VIDEO_CODEC:-h264_nvenc}
      CONCAT_CRF: ${CONCAT_CRF:-18}
      CONCAT_PRESET: ${CONCAT_PRESET:-p4}
      CONCAT_STITCH_TIMEOUT: ${CONCAT_STITCH_TIMEOUT:-30m}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: video,compute,utility

      # Chroma-key (disabled by default)
      CHROMA_KEY_ENABLED: ${CHROMA_KEY_ENABLED:-false}
      CHROMA_KEY_BG_PATH: ${CHROMA_KEY_BG_PATH:-}
      CHROMA_KEY_BG_COLOR: ${CHROMA_KEY_BG_COLOR:-0x1a1a2e}

      # RabbitMQ on the main server — for completion notifications to video-publisher
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-video.produced}

    volumes:
      # Bind the shared video output directory directly. Point NFS_OUTPUT_MOUNT at
      # the host's Video/Output path, not the NFS share root.
      - ${NFS_OUTPUT_MOUNT:-/mnt/herbhub-video/Video/Output}:/mnt/herbhub-video/Video/Output
      - ${VIDEO_RESOURCES_PATH:-/mnt/herbhub-video/Resources/video}:/app/resources/video:ro
      - ${VIDEO_BG_RESOURCES_PATH:-/mnt/herbhub-video/Resources/video_backgrounds}:/app/resources/video_backgrounds:ro

networks:
  aistack:
    external: true
