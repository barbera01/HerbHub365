<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Raleway', 'Inter', system-ui, sans-serif">
  <defs>
    <!-- Botanical background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#eef5f0"/>
    </linearGradient>
    <!-- Forest header bar -->
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3d2b"/>
      <stop offset="100%" stop-color="#2d5a3d"/>
    </linearGradient>
    <!-- Node fills -->
    <linearGradient id="nodeGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef5f0"/>
    </linearGradient>
    <linearGradient id="nodeGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf3e2"/>
    </linearGradient>
    <linearGradient id="nodeTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f6f3"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4a7c59"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#c0714a"/>
    </marker>
    <!-- Soft shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3d2b" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a3d2b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" rx="20" fill="url(#bg)"/>
  <rect width="1100" height="520" rx="20" fill="none" stroke="#4a7c5930" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1100" height="56" rx="20" fill="url(#header)"/>
  <rect x="0" y="36" width="1100" height="20" fill="url(#header)"/>
  <text x="32" y="36" fill="#9dc4a5" font-size="10" font-weight="800" letter-spacing="0.16em" text-transform="uppercase">ARCHITECTURE</text>
  <text x="32" y="36" fill="#9dc4a5" font-size="10" font-weight="800" letter-spacing="0.16em">ARCHITECTURE</text>
  <text x="550" y="38" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle" font-family="'Lora', Georgia, serif">Prometheus Metrics Blog Post Pipeline</text>

  <!-- ════════ STAGE 1: Prometheus ════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="84" width="160" height="140" rx="16" fill="url(#nodeGreen)" stroke="#4a7c5930" stroke-width="1"/>
    <rect x="30" y="84" width="160" height="4" rx="2" fill="#4a7c59"/>
  </g>
  <!-- Icon: gauge -->
  <circle cx="110" cy="124" r="18" fill="#4a7c5915" stroke="#4a7c59" stroke-width="1.5"/>
  <path d="M102 130 L110 118 L118 130" fill="none" stroke="#4a7c59" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="110" cy="124" r="3" fill="#4a7c59"/>
  <text x="110" y="158" text-anchor="middle" fill="#1a3d2b" font-size="13" font-weight="700" font-family="'Lora', Georgia, serif">Prometheus</text>
  <text x="110" y="174" text-anchor="middle" fill="#6b8070" font-size="9.5">query_range API</text>
  <text x="110" y="188" text-anchor="middle" fill="#6b8070" font-size="9.5">11 PromQL queries</text>
  <text x="110" y="202" text-anchor="middle" fill="#6b8070" font-size="9.5">24h range / 5m step</text>

  <!-- Arrow 1 → 2 -->
  <line x1="190" y1="154" x2="240" y2="154" stroke="#4a7c59" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>

  <!-- ════════ STAGE 2: blog-poster (prom-post) ════════ -->
  <g filter="url(#shadow)">
    <rect x="248" y="78" width="195" height="152" rx="16" fill="url(#nodeGold)" stroke="#c0714a30" stroke-width="1"/>
    <rect x="248" y="78" width="195" height="4" rx="2" fill="#c0714a"/>
  </g>
  <!-- Icon: cog / service -->
  <rect x="320" y="100" width="28" height="28" rx="6" fill="#c0714a18" stroke="#c0714a" stroke-width="1.2"/>
  <circle cx="334" cy="114" r="6" fill="none" stroke="#c0714a" stroke-width="1.5"/>
  <line x1="334" y1="107" x2="334" y2="105" stroke="#c0714a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="334" y1="123" x2="334" y2="121" stroke="#c0714a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="327" y1="114" x2="325" y2="114" stroke="#c0714a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="343" y1="114" x2="341" y2="114" stroke="#c0714a" stroke-width="1.2" stroke-linecap="round"/>
  <text x="345" y="148" text-anchor="middle" fill="#1a3d2b" font-size="13" font-weight="700" font-family="'Lora', Georgia, serif">blog-poster</text>
  <text x="345" y="164" text-anchor="middle" fill="#6b8070" font-size="9.5">prom-post mode</text>
  <text x="345" y="180" text-anchor="middle" fill="#c0714a" font-size="9" font-weight="700">prompost.Generate()</text>
  <text x="345" y="195" text-anchor="middle" fill="#6b8070" font-size="9.5">Fetches, transforms</text>
  <text x="345" y="209" text-anchor="middle" fill="#6b8070" font-size="9.5">&amp; exports data</text>

  <!-- Arrow 2 → 3 (splits into two) -->
  <path d="M443 130 L480 130 L480 120 L510 120" fill="none" stroke="#4a7c59" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>
  <path d="M443 175 L480 175 L480 280 L510 280" fill="none" stroke="#c0714a" stroke-width="2" marker-end="url(#arrowGold)" stroke-dasharray="6 3"/>

  <!-- ════════ STAGE 3a: JSON Exports ════════ -->
  <g filter="url(#shadowSm)">
    <rect x="518" y="84" width="175" height="100" rx="14" fill="url(#nodeTeal)" stroke="#14b8a630" stroke-width="1"/>
    <rect x="518" y="84" width="175" height="4" rx="2" fill="#14b8a6"/>
  </g>
  <!-- Icon: file/json -->
  <rect x="583" y="100" width="22" height="26" rx="3" fill="#14b8a615" stroke="#14b8a6" stroke-width="1.2"/>
  <path d="M593 100 L605 112" fill="none" stroke="#14b8a6" stroke-width="1"/>
  <line x1="589" y1="112" x2="599" y2="112" stroke="#14b8a6" stroke-width="1" stroke-linecap="round"/>
  <line x1="589" y1="117" x2="599" y2="117" stroke="#14b8a6" stroke-width="1" stroke-linecap="round"/>
  <text x="605" y="146" text-anchor="middle" fill="#1a3d2b" font-size="12" font-weight="700" font-family="'Lora', Georgia, serif">JSON Snapshots</text>
  <text x="605" y="160" text-anchor="middle" fill="#6b8070" font-size="9.5">hub/assets/data/prometheus/</text>
  <text x="605" y="174" text-anchor="middle" fill="#6b8070" font-size="9.5">11 chart export files</text>

  <!-- ════════ STAGE 3b: Jekyll Post ════════ -->
  <g filter="url(#shadowSm)">
    <rect x="518" y="240" width="175" height="110" rx="14" fill="url(#nodeGold)" stroke="#c0714a30" stroke-width="1"/>
    <rect x="518" y="240" width="175" height="4" rx="2" fill="#c8a45a"/>
  </g>
  <!-- Icon: document -->
  <rect x="583" y="258" width="22" height="26" rx="3" fill="#c8a45a18" stroke="#c8a45a" stroke-width="1.2"/>
  <line x1="589" y1="268" x2="599" y2="268" stroke="#c8a45a" stroke-width="1" stroke-linecap="round"/>
  <line x1="589" y1="273" x2="596" y2="273" stroke="#c8a45a" stroke-width="1" stroke-linecap="round"/>
  <text x="605" y="302" text-anchor="middle" fill="#1a3d2b" font-size="12" font-weight="700" font-family="'Lora', Georgia, serif">Jekyll Post</text>
  <text x="605" y="316" text-anchor="middle" fill="#6b8070" font-size="9.5">hub/_posts/</text>
  <text x="605" y="330" text-anchor="middle" fill="#6b8070" font-size="9.5">Front matter + body</text>
  <text x="605" y="342" text-anchor="middle" fill="#c0714a" font-size="9" font-weight="600">prometheus_charts: true</text>

  <!-- Arrow 3a + 3b → 4 -->
  <path d="M693 134 L730 134 L730 230 L760 230" fill="none" stroke="#4a7c59" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>
  <path d="M693 295 L730 295 L730 260 L760 260" fill="none" stroke="#c0714a" stroke-width="2" marker-end="url(#arrowGold)" stroke-dasharray="6 3"/>

  <!-- ════════ STAGE 4: Git Publish ════════ -->
  <g filter="url(#shadow)">
    <rect x="768" y="196" width="145" height="120" rx="16" fill="url(#nodeGreen)" stroke="#4a7c5930" stroke-width="1"/>
    <rect x="768" y="196" width="145" height="4" rx="2" fill="#2d5a3d"/>
  </g>
  <!-- Icon: git branch -->
  <circle cx="840" cy="224" r="14" fill="#2d5a3d15" stroke="#2d5a3d" stroke-width="1.2"/>
  <circle cx="836" cy="221" r="3" fill="none" stroke="#2d5a3d" stroke-width="1.3"/>
  <circle cx="844" cy="228" r="3" fill="none" stroke="#2d5a3d" stroke-width="1.3"/>
  <line x1="838" y1="224" x2="842" y2="226" stroke="#2d5a3d" stroke-width="1.2"/>
  <text x="840" y="258" text-anchor="middle" fill="#1a3d2b" font-size="12" font-weight="700" font-family="'Lora', Georgia, serif">Git Publish</text>
  <text x="840" y="273" text-anchor="middle" fill="#6b8070" font-size="9.5">git add + commit</text>
  <text x="840" y="287" text-anchor="middle" fill="#6b8070" font-size="9.5">push to main</text>
  <text x="840" y="301" text-anchor="middle" fill="#2d5a3d" font-size="9" font-weight="600">PAT auth</text>

  <!-- Arrow 4 → 5 -->
  <line x1="913" y1="256" x2="948" y2="256" stroke="#4a7c59" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>

  <!-- ════════ STAGE 5: GitHub Pages ════════ -->
  <g filter="url(#shadow)">
    <rect x="956" y="196" width="120" height="120" rx="16" fill="url(#nodeGreen)" stroke="#4a7c5930" stroke-width="1"/>
    <rect x="956" y="196" width="120" height="4" rx="2" fill="#4a7c59"/>
  </g>
  <!-- Icon: globe -->
  <circle cx="1016" cy="228" r="14" fill="#4a7c5915" stroke="#4a7c59" stroke-width="1.5"/>
  <ellipse cx="1016" cy="228" rx="7" ry="14" fill="none" stroke="#4a7c59" stroke-width="1"/>
  <line x1="1002" y1="228" x2="1030" y2="228" stroke="#4a7c59" stroke-width="1"/>
  <text x="1016" y="260" text-anchor="middle" fill="#1a3d2b" font-size="12" font-weight="700" font-family="'Lora', Georgia, serif">GitHub Pages</text>
  <text x="1016" y="275" text-anchor="middle" fill="#6b8070" font-size="9.5">herbhub365.com</text>
  <text x="1016" y="289" text-anchor="middle" fill="#6b8070" font-size="9.5">Static site</text>
  <text x="1016" y="303" text-anchor="middle" fill="#4a7c59" font-size="9" font-weight="600">ECharts renders</text>

  <!-- ════════ Bottom info bar ════════ -->
  <rect x="30" y="388" width="1040" height="110" rx="14" fill="#1a3d2b08" stroke="#4a7c5918" stroke-width="1"/>
  <text x="550" y="414" text-anchor="middle" fill="#1a3d2b" font-size="11" font-weight="800" letter-spacing="0.14em">DATA FLOW SUMMARY</text>

  <!-- Flow description items -->
  <!-- Step 1 -->
  <circle cx="80" cy="444" r="12" fill="#4a7c59" stroke="none"/>
  <text x="80" y="448" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">1</text>
  <text x="100" y="440" fill="#1a3d2b" font-size="10" font-weight="700">Prometheus scraped</text>
  <text x="100" y="454" fill="#6b8070" font-size="9">Greenhouse sensors export metrics</text>
  <text x="100" y="466" fill="#6b8070" font-size="9">every 30s via node exporter</text>

  <!-- Step 2 -->
  <circle cx="320" cy="444" r="12" fill="#c0714a" stroke="none"/>
  <text x="320" y="448" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">2</text>
  <text x="340" y="440" fill="#1a3d2b" font-size="10" font-weight="700">blog-poster queries</text>
  <text x="340" y="454" fill="#6b8070" font-size="9">prom-queries.json defines 11</text>
  <text x="340" y="466" fill="#6b8070" font-size="9">PromQL queries over 24h windows</text>

  <!-- Step 3 -->
  <circle cx="560" cy="444" r="12" fill="#14b8a6" stroke="none"/>
  <text x="560" y="448" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">3</text>
  <text x="580" y="440" fill="#1a3d2b" font-size="10" font-weight="700">Static JSON exported</text>
  <text x="580" y="454" fill="#6b8070" font-size="9">Chart data committed as assets</text>
  <text x="580" y="466" fill="#6b8070" font-size="9">alongside the Jekyll post file</text>

  <!-- Step 4 -->
  <circle cx="800" cy="444" r="12" fill="#2d5a3d" stroke="none"/>
  <text x="800" y="448" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">4</text>
  <text x="820" y="440" fill="#1a3d2b" font-size="10" font-weight="700">Client-side rendered</text>
  <text x="820" y="454" fill="#6b8070" font-size="9">ECharts reads JSON at page load</text>
  <text x="820" y="466" fill="#6b8070" font-size="9">— no server-side processing</text>

  <!-- Subtle leaf decoration bottom-right -->
  <ellipse cx="1060" cy="490" rx="40" ry="20" transform="rotate(-20 1060 490)" fill="#4a7c59" opacity="0.04"/>
  <ellipse cx="40" cy="490" rx="32" ry="16" transform="rotate(25 40 490)" fill="#c0714a" opacity="0.04"/>
</svg>