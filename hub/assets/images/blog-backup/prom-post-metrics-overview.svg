<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="'Raleway', 'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#eef5f0"/>
    </linearGradient>
    <linearGradient id="hdr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3d2b"/>
      <stop offset="100%" stop-color="#2d5a3d"/>
    </linearGradient>
    <linearGradient id="envFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef5f0"/>
    </linearGradient>
    <linearGradient id="soilFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3faf0"/>
    </linearGradient>
    <linearGradient id="waterFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f6f3"/>
    </linearGradient>
    <linearGradient id="systemFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf3e2"/>
    </linearGradient>
    <linearGradient id="centerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a3d"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </linearGradient>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3d2b" flood-opacity="0.12"/>
    </filter>
    <filter id="shSm2" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a3d2b" flood-opacity="0.08"/>
    </filter>
    <!-- Connection lines -->
    <marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5">
      <circle cx="3" cy="3" r="2.5" fill="#4a7c59"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="640" rx="20" fill="url(#bg2)"/>
  <rect width="1100" height="640" rx="20" fill="none" stroke="#4a7c5930" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1100" height="56" rx="20" fill="url(#hdr2)"/>
  <rect x="0" y="36" width="1100" height="20" fill="url(#hdr2)"/>
  <text x="32" y="36" fill="#9dc4a5" font-size="10" font-weight="800" letter-spacing="0.16em">OBSERVABILITY</text>
  <text x="550" y="38" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle" font-family="'Lora', Georgia, serif">Greenhouse Metrics Tracked by Herb Hub 365</text>

  <!-- ════════ CENTER HUB ════════ -->
  <g filter="url(#sh2)">
    <rect x="420" y="240" width="260" height="120" rx="20" fill="url(#centerFill)"/>
  </g>
  <!-- Leaf decoration in center -->
  <ellipse cx="640" cy="300" rx="30" ry="15" transform="rotate(-15 640 300)" fill="#ffffff" opacity="0.06"/>
  <text x="550" y="282" text-anchor="middle" fill="#9dc4a5" font-size="9" font-weight="800" letter-spacing="0.14em">PROMETHEUS</text>
  <text x="550" y="304" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700" font-family="'Lora', Georgia, serif">Herb Hub 365</text>
  <text x="550" y="322" text-anchor="middle" fill="#9dc4a580" font-size="10">prom-queries.json</text>
  <text x="550" y="338" text-anchor="middle" fill="#9dc4a580" font-size="10">11 metrics · 24h range · 5m step</text>

  <!-- ════════ CATEGORY: ENVIRONMENT (top-left) ════════ -->
  <!-- Connection lines from center to category -->
  <line x1="420" y1="272" x2="300" y2="160" stroke="#4a7c5940" stroke-width="1.5" stroke-dasharray="4 3"/>

  <g filter="url(#shSm2)">
    <rect x="24" y="80" width="276" height="210" rx="16" fill="url(#envFill)" stroke="#4a7c5920" stroke-width="1"/>
    <rect x="24" y="80" width="276" height="4" rx="2" fill="#4a7c59"/>
  </g>
  <!-- Category header -->
  <text x="44" y="110" fill="#4a7c59" font-size="9" font-weight="800" letter-spacing="0.14em">ENVIRONMENT</text>
  <!-- Metric items -->
  <!-- Temperature -->
  <g>
    <rect x="40" y="124" width="244" height="34" rx="8" fill="#ef444412" stroke="#ef444420" stroke-width="0.8"/>
    <circle cx="58" cy="141" r="10" fill="#ef444418"/>
    <text x="57" y="145" text-anchor="middle" fill="#ef4444" font-size="11">🌡</text>
    <text x="76" y="138" fill="#1a3d2b" font-size="11" font-weight="700">Environment Temperature</text>
    <text x="76" y="150" fill="#6b8070" font-size="8.5">herbhub_env_temperature_c · °C</text>
  </g>
  <!-- Humidity -->
  <g>
    <rect x="40" y="164" width="244" height="34" rx="8" fill="#38bdf814" stroke="#38bdf820" stroke-width="0.8"/>
    <circle cx="58" cy="181" r="10" fill="#38bdf818"/>
    <text x="57" y="185" text-anchor="middle" fill="#38bdf8" font-size="11">💧</text>
    <text x="76" y="178" fill="#1a3d2b" font-size="11" font-weight="700">Environment Humidity</text>
    <text x="76" y="190" fill="#6b8070" font-size="8.5">herbhub_env_humidity_percent · %</text>
  </g>
  <!-- Pressure -->
  <g>
    <rect x="40" y="204" width="244" height="34" rx="8" fill="#3b82f612" stroke="#3b82f620" stroke-width="0.8"/>
    <circle cx="58" cy="221" r="10" fill="#3b82f618"/>
    <text x="57" y="225" text-anchor="middle" fill="#3b82f6" font-size="11">⏲</text>
    <text x="76" y="218" fill="#1a3d2b" font-size="11" font-weight="700">Barometric Pressure</text>
    <text x="76" y="230" fill="#6b8070" font-size="8.5">herbhub_env_pressure_hpa · hPa</text>
  </g>
  <!-- Light -->
  <g>
    <rect x="40" y="244" width="244" height="34" rx="8" fill="#f59e0b14" stroke="#f59e0b20" stroke-width="0.8"/>
    <circle cx="58" cy="261" r="10" fill="#f59e0b18"/>
    <text x="57" y="265" text-anchor="middle" fill="#f59e0b" font-size="11">☀</text>
    <text x="76" y="258" fill="#1a3d2b" font-size="11" font-weight="700">Ambient Light</text>
    <text x="76" y="270" fill="#6b8070" font-size="8.5">herbhub_light_lux · lux</text>
  </g>

  <!-- ════════ CATEGORY: SOIL (top-right) ════════ -->
  <line x1="680" y1="272" x2="810" y2="160" stroke="#84cc1640" stroke-width="1.5" stroke-dasharray="4 3"/>

  <g filter="url(#shSm2)">
    <rect x="800" y="80" width="276" height="170" rx="16" fill="url(#soilFill)" stroke="#84cc1620" stroke-width="1"/>
    <rect x="800" y="80" width="276" height="4" rx="2" fill="#84cc16"/>
  </g>
  <text x="820" y="110" fill="#3f6212" font-size="9" font-weight="800" letter-spacing="0.14em">SOIL</text>
  <!-- Soil Moisture % -->
  <g>
    <rect x="816" y="124" width="244" height="34" rx="8" fill="#84cc1614" stroke="#84cc1624" stroke-width="0.8"/>
    <circle cx="834" cy="141" r="10" fill="#84cc1618"/>
    <text x="833" y="145" text-anchor="middle" fill="#84cc16" font-size="11">🌱</text>
    <text x="852" y="138" fill="#1a3d2b" font-size="11" font-weight="700">Soil Moisture Percent</text>
    <text x="852" y="150" fill="#6b8070" font-size="8.5">herbhub_soil_percent · %</text>
  </g>
  <!-- Soil Voltage -->
  <g>
    <rect x="816" y="164" width="244" height="34" rx="8" fill="#84cc1614" stroke="#84cc1624" stroke-width="0.8"/>
    <circle cx="834" cy="181" r="10" fill="#84cc1618"/>
    <text x="833" y="185" text-anchor="middle" fill="#65a30d" font-size="11">⚡</text>
    <text x="852" y="178" fill="#1a3d2b" font-size="11" font-weight="700">Soil Sensor Voltage</text>
    <text x="852" y="190" fill="#6b8070" font-size="8.5">herbhub_soil_voltage · V</text>
  </g>
  <!-- Probe Temps -->
  <g>
    <rect x="816" y="204" width="244" height="34" rx="8" fill="#ef444412" stroke="#ef444418" stroke-width="0.8"/>
    <circle cx="834" cy="221" r="10" fill="#ef444418"/>
    <text x="833" y="225" text-anchor="middle" fill="#ef4444" font-size="11">🌡</text>
    <text x="852" y="218" fill="#1a3d2b" font-size="11" font-weight="700">Probe Temperatures</text>
    <text x="852" y="230" fill="#6b8070" font-size="8.5">herbhub_temperature_c · °C</text>
  </g>

  <!-- ════════ CATEGORY: WATER RESERVOIR (bottom-left) ════════ -->
  <line x1="440" y1="340" x2="300" y2="430" stroke="#14b8a640" stroke-width="1.5" stroke-dasharray="4 3"/>

  <g filter="url(#shSm2)">
    <rect x="24" y="390" width="276" height="170" rx="16" fill="url(#waterFill)" stroke="#14b8a620" stroke-width="1"/>
    <rect x="24" y="390" width="276" height="4" rx="2" fill="#14b8a6"/>
  </g>
  <text x="44" y="420" fill="#0f766e" font-size="9" font-weight="800" letter-spacing="0.14em">WATER RESERVOIR</text>
  <!-- Water Distance -->
  <g>
    <rect x="40" y="434" width="244" height="34" rx="8" fill="#14b8a614" stroke="#14b8a620" stroke-width="0.8"/>
    <circle cx="58" cy="451" r="10" fill="#14b8a618"/>
    <text x="57" y="455" text-anchor="middle" fill="#14b8a6" font-size="11">📏</text>
    <text x="76" y="448" fill="#1a3d2b" font-size="11" font-weight="700">Water Distance</text>
    <text x="76" y="460" fill="#6b8070" font-size="8.5">herbhub_water_distance_cm · cm</text>
  </g>
  <!-- Water Percent -->
  <g>
    <rect x="40" y="474" width="244" height="34" rx="8" fill="#14b8a614" stroke="#14b8a620" stroke-width="0.8"/>
    <circle cx="58" cy="491" r="10" fill="#14b8a618"/>
    <text x="57" y="495" text-anchor="middle" fill="#0ea5e9" font-size="11">💦</text>
    <text x="76" y="488" fill="#1a3d2b" font-size="11" font-weight="700">Reservoir Percent</text>
    <text x="76" y="500" fill="#6b8070" font-size="8.5">herbhub_water_percent · %</text>
  </g>
  <!-- Water Volume -->
  <g>
    <rect x="40" y="514" width="244" height="34" rx="8" fill="#14b8a614" stroke="#14b8a620" stroke-width="0.8"/>
    <circle cx="58" cy="531" r="10" fill="#14b8a618"/>
    <text x="57" y="535" text-anchor="middle" fill="#14b8a6" font-size="11">🪣</text>
    <text x="76" y="528" fill="#1a3d2b" font-size="11" font-weight="700">Reservoir Volume</text>
    <text x="76" y="540" fill="#6b8070" font-size="8.5">herbhub_water_volume_ml · ml</text>
  </g>

  <!-- ════════ CATEGORY: SYSTEM (bottom-right) ════════ -->
  <line x1="660" y1="340" x2="810" y2="430" stroke="#c8a45a40" stroke-width="1.5" stroke-dasharray="4 3"/>

  <g filter="url(#shSm2)">
    <rect x="800" y="390" width="276" height="130" rx="16" fill="url(#systemFill)" stroke="#c8a45a20" stroke-width="1"/>
    <rect x="800" y="390" width="276" height="4" rx="2" fill="#c8a45a"/>
  </g>
  <text x="820" y="420" fill="#92400e" font-size="9" font-weight="800" letter-spacing="0.14em">SYSTEM HEALTH</text>
  <!-- Last Run Age -->
  <g>
    <rect x="816" y="434" width="244" height="34" rx="8" fill="#c8a45a14" stroke="#c8a45a20" stroke-width="0.8"/>
    <circle cx="834" cy="451" r="10" fill="#c8a45a18"/>
    <text x="833" y="455" text-anchor="middle" fill="#c8a45a" font-size="11">⏱</text>
    <text x="852" y="448" fill="#1a3d2b" font-size="11" font-weight="700">Last Run Age</text>
    <text x="852" y="460" fill="#6b8070" font-size="8.5">herbhub_last_run_seconds · s</text>
  </g>

  <!-- Sensor source note -->
  <g>
    <rect x="816" y="480" width="244" height="32" rx="8" fill="#1a3d2b08" stroke="#1a3d2b10" stroke-width="0.8"/>
    <text x="838" y="500" fill="#6b8070" font-size="9">Scraped every 30s by Prometheus</text>
  </g>

  <!-- ════════ Bottom stats bar ════════ -->
  <rect x="340" y="586" width="420" height="36" rx="18" fill="#1a3d2b10" stroke="#4a7c5918" stroke-width="1"/>
  <text x="550" y="609" text-anchor="middle" fill="#1a3d2b" font-size="11" font-weight="700">
    <tspan fill="#4a7c59" font-weight="800">4</tspan> categories ·
    <tspan fill="#4a7c59" font-weight="800">11</tspan> metrics ·
    <tspan fill="#4a7c59" font-weight="800">24h</tspan> range ·
    <tspan fill="#4a7c59" font-weight="800">5m</tspan> resolution
  </text>

  <!-- Decorative leaves -->
  <ellipse cx="1065" cy="610" rx="35" ry="18" transform="rotate(-20 1065 610)" fill="#4a7c59" opacity="0.04"/>
  <ellipse cx="35" cy="610" rx="28" ry="14" transform="rotate(25 35 610)" fill="#c0714a" opacity="0.04"/>
</svg>