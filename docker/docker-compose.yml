
services:
  blog-poster:
    build:
      context: ../services/blog-poster
      dockerfile: dockerfile
    container_name: blog-poster
    restart: unless-stopped
    networks:
      - herbhub
    environment:
      BLOG_POSTER_MODE: ${BLOG_POSTER_MODE:-daemon}
      BLOG_GENERATE_SCHEDULE: ${BLOG_GENERATE_SCHEDULE:-5 0 * * *}
      BLOG_TARGET_DATE: ${BLOG_TARGET_DATE:-yesterday}
      RABBITMQ_URL: ${BLOG_POSTER_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_QUEUE: ${BLOG_POSTER_RABBITMQ_QUEUE:-sensor.snapshots}
      LLM_BASE_URL: ${BLOG_POSTER_LLM_BASE_URL:-http://ollama.la.home-cloud.uk}
      LLM_API_KEY: ${BLOG_POSTER_LLM_API_KEY:-}
      LLM_MODEL: ${BLOG_POSTER_LLM_MODEL:-qwen2.5:latest}
      LLM_TEMPERATURE: ${BLOG_POSTER_LLM_TEMPERATURE:-0.6}
      LLM_MAX_TOKENS: ${BLOG_POSTER_LLM_MAX_TOKENS:-900}
      LLM_REQUEST_TIMEOUT: ${BLOG_POSTER_LLM_REQUEST_TIMEOUT:-5m}
      LLM_DEBUG: ${BLOG_POSTER_LLM_DEBUG:-false}
      GIT_PUBLISH_ENABLED: ${BLOG_POSTER_GIT_PUBLISH_ENABLED:-false}
      GIT_REPO_DIR: /repo
      GIT_REMOTE_NAME: ${BLOG_POSTER_GIT_REMOTE_NAME:-origin}
      GIT_PUSH_BRANCH: ${BLOG_POSTER_GIT_PUSH_BRANCH:-main}
      GIT_PAT: ${BLOG_POSTER_GIT_PAT:-}
      GIT_AUTHOR_NAME: ${BLOG_POSTER_GIT_AUTHOR_NAME:-Herb Hub Bot}
      GIT_AUTHOR_EMAIL: ${BLOG_POSTER_GIT_AUTHOR_EMAIL:-bot@herbhub365.com}
      HUB_DIR: /repo/hub
      BLOG_POSTS_DIR: /repo/hub/_posts
      BLOG_DRAFTS_DIR: /repo/hub/_drafts
      DATA_DIR: /data
    volumes:
      - ..:/repo
      - ../services/blog-poster/data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - herbhub
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: yourpassword
    volumes:
      - ./rabbitmq:/var/lib/rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(\"rabbit.herbhub365.com\")"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"

      - "traefik.tcp.routers.rabbitmq-amqp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.rabbitmq-amqp.entrypoints=amqp"
      - "traefik.tcp.services.rabbitmq-amqp.loadbalancer.server.port=5672"

  dashboard:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: dashboard
    networks:
      - herbhub
    volumes:
      - ./dashboard:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock # (optional) For docker integrations, see alternative methods
  

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(\"dashboard.herbhub365.com\")"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
    

  schedular:
    image: soulteary/cronicle:0.9.63
    restart: always
    container_name: scheduler
    networks:
      - herbhub
    volumes:
      - ./scheduler/config:/opt/cronicle/config
      - ./scheduler/data:/opt/cronicle/data
      - ./scheduler/plugins:/opt/cronicle/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:3012/api/app/ping || exit 1"]
      interval: 5s
      timeout: 1s
      retries: 3
    logging:
        driver: "json-file"
        options:
            max-size: "10m"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cronicle.rule=Host(`scheduler.herbhub365.com`)"
      - "traefik.http.routers.cronicle.entrypoints=websecure"
      - "traefik.http.routers.cronicle.tls=true"
      - "traefik.http.services.cronicle.loadbalancer.server.port=3012"

  traefik:
    image: docker.io/library/traefik:latest
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "5672:5672"
    networks:
      herbhub:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/traefik:/etc/traefik
      - /usr/share/certs/herbhub365:/etc/traefik/certs
    restart: unless-stopped

networks:
  herbhub:
    external: true
