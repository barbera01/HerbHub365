<!DOCTYPE html>
<!--
  HerbHub365 — Video Overlay: Lower Third
  ────────────────────────────────────────
  Canvas:  1920 × 130 px  (transparent background → PNG)
  Sections: Brand | Environment | Oregano | Chilli | Basil | Info
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HerbHub365 — Lower Third Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest:     #1a3d2b;
      --canopy:     #2d5a3d;
      --leaf:       #5fa870;
      --sage:       #7dba90;
      --clay:       #c0714a;
      --gold:       #c8a45a;
      --ink:        #e8f0ea;
      --ink-soft:   #b8ccbe;
      --ink-muted:  #7a9e85;
      --card-bg:    rgba(10, 22, 14, 0.93);
      --border-col: rgba(74, 124, 89, 0.26);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 130px;
      overflow: hidden;
      background: transparent;
      -webkit-font-smoothing: antialiased;
      font-family: 'Raleway', sans-serif;
    }

    .strip {
      width: 1920px;
      height: 130px;
      background-color: var(--card-bg);
      background-image: linear-gradient(90deg, rgba(45,90,61,0.18) 0%, transparent 20%, transparent 80%, rgba(45,90,61,0.10) 100%);
      border-top: 1px solid var(--border-col);
      border-radius: 18px 18px 0 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      box-shadow: 0 -6px 30px rgba(0,0,0,0.45);
      position: relative;
    }

    /* Top accent stripe */
    .strip::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--canopy), var(--leaf) 50%, var(--sage));
      border-radius: 18px 18px 0 0;
    }

    .divider {
      width: 1px;
      background: rgba(74,124,89,0.18);
      flex-shrink: 0;
      margin: 14px 0;
    }

    /* ── Brand panel ─────────────────────────────────────────── */
    .brand-panel {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 16px;
    }

    .brand-row { display: flex; align-items: center; gap: 7px; }
    .brand-leaf { color: var(--leaf); }
    .brand-name {
      font-family: 'Lora', serif;
      font-size: 18px; font-weight: 700;
      color: var(--ink); letter-spacing: -0.025em; line-height: 1;
    }
    .brand-name em {
      font-style: normal; color: var(--sage);
      font-size: 11px; font-weight: 600; vertical-align: super;
    }
    .brand-tagline {
      font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ── Environment panel ────────────────────────────────────── */
    .env-panel {
      width: 210px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 16px;
      background: rgba(30,58,138,0.08);
    }

    .env-panel-header {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 7px;
    }
    .env-panel-icon { color: var(--sage); }
    .env-panel-title {
      font-size: 7px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-muted);
    }

    .env-metrics {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .env-metric-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .env-metric-icon { flex-shrink: 0; display: flex; }
    .env-metric-value {
      font-family: 'Lora', serif;
      font-size: 14px; font-weight: 700;
      color: var(--ink); line-height: 1;
      flex: 1;
    }
    .env-metric-label {
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ── Herb cells ───────────────────────────────────────────── */
    .herb-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 10px 0;
    }

    .herb-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 20px;
      gap: 7px;
      position: relative;
    }
    .herb-cell + .herb-cell { border-left: 1px solid rgba(74,124,89,0.14); }

    .herb-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      border-radius: 0 0 3px 3px;
    }
    .herb-cell--healthy::before { background: #4a7c59; }
    .herb-cell--monitor::before { background: #c8a45a; }
    .herb-cell--alert::before   { background: #c0714a; }

    .herb-cell-top {
      display: flex; align-items: center; gap: 8px; width: 100%;
    }

    .herb-icon {
      width: 30px; height: 30px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .herb-icon--oregano { background: rgba(107,158,120,0.22); color: #7dba90; }
    .herb-icon--chilli  { background: rgba(192,113,74,0.24);  color: #d4855e; }
    .herb-icon--basil   { background: rgba(45,90,61,0.26);    color: #5fa870; }

    .herb-name {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-soft); flex: 1;
    }

    .status-badge {
      font-size: 7.5px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 100px;
      border: 1px solid transparent; line-height: 1.3;
    }
    .status-badge--healthy { color: #4ade80; background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.28);  }
    .status-badge--monitor { color: #fbbf24; background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.28); }
    .status-badge--alert   {
      color: #fca5a5; background: rgba(248,113,113,0.14); border-color: rgba(248,113,113,0.32);
      animation: alertGlow 2.8s ease-in-out infinite;
    }

    .herb-cell-readings {
      display: flex; gap: 14px;
      padding-left: 38px;
    }

    .reading { display: flex; flex-direction: column; gap: 1px; }
    .reading-value {
      font-family: 'Lora', serif;
      font-size: 15px; font-weight: 700;
      color: var(--ink); line-height: 1;
    }
    .reading-label {
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.11em; text-transform: uppercase;
      color: var(--ink-muted); line-height: 1;
    }

    /* ── Info panel ───────────────────────────────────────────── */
    .info-panel {
      width: 190px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
    }

    .live-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,0.11);
      border: 1px solid rgba(34,197,94,0.27);
      border-radius: 100px;
      padding: 3px 9px 3px 7px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%;
      animation: livePulse 2s ease-in-out infinite;
    }
    .live-text {
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: #4ade80;
    }

    .info-stats { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; }
    .info-label {
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--ink-muted);
    }
    .info-value {
      font-family: 'Lora', serif;
      font-size: 12px; font-weight: 700;
      color: var(--ink);
    }
    .info-value--alert { color: #fca5a5; }

    @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes alertGlow {
      0%, 100% { border-color: rgba(248,113,113,0.32); background: rgba(248,113,113,0.14); }
      50%       { border-color: rgba(248,113,113,0.55); background: rgba(248,113,113,0.24); }
    }
  </style>
</head>
<body>
<div class="strip">

  <!-- ── BRAND ─────────────────────────────────────────────── -->
  <div class="brand-panel">
    <div class="brand-row">
      <svg class="brand-leaf" viewBox="0 0 40 60" width="18" height="26" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 4C30 12 36 26 34 38C32 50 26 58 20 62C14 58 8 50 6 38C4 26 10 12 20 4Z" fill="currentColor"/>
        <line x1="20" y1="8"  x2="20" y2="58" stroke="#0a160e" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
        <line x1="20" y1="22" x2="14" y2="30" stroke="#0a160e" stroke-width="1.1" opacity="0.28" stroke-linecap="round"/>
        <line x1="20" y1="22" x2="26" y2="30" stroke="#0a160e" stroke-width="1.1" opacity="0.28" stroke-linecap="round"/>
        <line x1="20" y1="34" x2="13" y2="42" stroke="#0a160e" stroke-width="1.1" opacity="0.28" stroke-linecap="round"/>
        <line x1="20" y1="34" x2="27" y2="42" stroke="#0a160e" stroke-width="1.1" opacity="0.28" stroke-linecap="round"/>
      </svg>
      <div class="brand-name">HerbHub<em>365</em></div>
    </div>
    <div class="brand-tagline">Live Sensor Data</div>
  </div>

  <div class="divider"></div>

  <!-- ── ENVIRONMENT ───────────────────────────────────────── -->
  <div class="env-panel">
    <div class="env-panel-header">
      <svg class="env-panel-icon" viewBox="0 0 24 24" width="11" height="11" fill="none"
           stroke="currentColor" stroke-width="1.7" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3.6 9h16.8M3.6 15h16.8M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18"/>
      </svg>
      <span class="env-panel-title">Environment</span>
    </div>
    <div class="env-metrics">

      <div class="env-metric-row">
        <div class="env-metric-icon">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#f87171"
               stroke-width="1.8" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
          </svg>
        </div>
        <div class="env-metric-value" data-key="env_temp">24.1°C</div>
        <div class="env-metric-label">Temp</div>
      </div>

      <div class="env-metric-row">
        <div class="env-metric-icon">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#60a5fa"
               stroke-width="1.8" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
          </svg>
        </div>
        <div class="env-metric-value" data-key="env_humidity">68%</div>
        <div class="env-metric-label">Humid</div>
      </div>

      <div class="env-metric-row">
        <div class="env-metric-icon">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#a78bfa"
               stroke-width="1.8" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="8"/>
            <path d="M12 12l2.8-3.5"/>
            <circle cx="12" cy="12" r="1.2" fill="#a78bfa" stroke="none"/>
          </svg>
        </div>
        <div class="env-metric-value" data-key="env_pressure">1013 hPa</div>
        <div class="env-metric-label">Pressure</div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- ── HERB GRID ─────────────────────────────────────────── -->
  <div class="herb-grid">

    <!-- OREGANO -->
    <div class="herb-cell herb-cell--healthy" data-herb="oregano">
      <div class="herb-cell-top">
        <div class="herb-icon herb-icon--oregano" aria-hidden="true">
          <svg viewBox="0 0 40 60" width="14" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4C30 12 36 26 34 38C32 50 26 58 20 62C14 58 8 50 6 38C4 26 10 12 20 4Z" fill="currentColor"/>
            <line x1="20" y1="8" x2="20" y2="58" stroke="rgba(0,0,0,0.28)" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="herb-name">Oregano</div>
        <div class="status-badge status-badge--healthy" data-key="oregano_status">Healthy</div>
      </div>
      <div class="herb-cell-readings">
        <div class="reading">
          <div class="reading-value" data-key="oregano_temp">21.8°</div>
          <div class="reading-label">Temp °C</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="oregano_soil">54%</div>
          <div class="reading-label">Soil</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="oregano_humidity">61%</div>
          <div class="reading-label">Humid</div>
        </div>
      </div>
    </div>

    <!-- CHILLI -->
    <div class="herb-cell herb-cell--alert" data-herb="chilli">
      <div class="herb-cell-top">
        <div class="herb-icon herb-icon--chilli" aria-hidden="true">
          <svg viewBox="0 0 40 60" width="14" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4C30 12 36 26 34 38C32 50 26 58 20 62C14 58 8 50 6 38C4 26 10 12 20 4Z" fill="currentColor"/>
            <line x1="20" y1="8" x2="20" y2="58" stroke="rgba(0,0,0,0.28)" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="herb-name">Chilli</div>
        <div class="status-badge status-badge--alert" data-key="chilli_status">Alert</div>
      </div>
      <div class="herb-cell-readings">
        <div class="reading">
          <div class="reading-value" data-key="chilli_temp">28.4°</div>
          <div class="reading-label">Temp °C</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="chilli_soil">18%</div>
          <div class="reading-label">Soil</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="chilli_humidity">52%</div>
          <div class="reading-label">Humid</div>
        </div>
      </div>
    </div>

    <!-- BASIL -->
    <div class="herb-cell herb-cell--monitor" data-herb="basil">
      <div class="herb-cell-top">
        <div class="herb-icon herb-icon--basil" aria-hidden="true">
          <svg viewBox="0 0 40 60" width="14" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4C30 12 36 26 34 38C32 50 26 58 20 62C14 58 8 50 6 38C4 26 10 12 20 4Z" fill="currentColor"/>
            <line x1="20" y1="8" x2="20" y2="58" stroke="rgba(0,0,0,0.28)" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="herb-name">Basil</div>
        <div class="status-badge status-badge--monitor" data-key="basil_status">Monitor</div>
      </div>
      <div class="herb-cell-readings">
        <div class="reading">
          <div class="reading-value" data-key="basil_temp">22.1°</div>
          <div class="reading-label">Temp °C</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="basil_soil">42%</div>
          <div class="reading-label">Soil</div>
        </div>
        <div class="reading">
          <div class="reading-value" data-key="basil_humidity">65%</div>
          <div class="reading-label">Humid</div>
        </div>
      </div>
    </div>

  </div><!-- /.herb-grid -->

  <div class="divider"></div>

  <!-- ── INFO PANEL ────────────────────────────────────────── -->
  <div class="info-panel">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">Live</span>
    </div>
    <div class="info-stats">
      <div class="info-row">
        <span class="info-label">Time</span>
        <span class="info-value" data-key="timestamp">14:23:07</span>
      </div>
      <div class="info-row">
        <span class="info-label">Env Temp</span>
        <span class="info-value" data-key="env_temp">24.1°C</span>
      </div>
      <div class="info-row">
        <span class="info-label">Alerts</span>
        <span class="info-value info-value--alert" data-key="alert_count">1</span>
      </div>
      <div class="info-row">
        <span class="info-label">Uptime</span>
        <span class="info-value" data-key="hub_uptime">14d 6h</span>
      </div>
    </div>
  </div>

</div>

<script>
  const STATUS_BADGE  = { healthy:'status-badge--healthy', monitor:'status-badge--monitor', alert:'status-badge--alert' };
  const STATUS_CELL   = { healthy:'herb-cell--healthy',    monitor:'herb-cell--monitor',    alert:'herb-cell--alert'    };
  const STATUS_LABELS = { healthy:'Healthy', monitor:'Monitor', alert:'Alert' };

  window.injectData = function(data) {
    Object.entries(data).forEach(([key, val]) => {
      document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
        if (key.endsWith('_status')) {
          const v = String(val).toLowerCase();
          el.className = `status-badge ${STATUS_BADGE[v] || STATUS_BADGE.healthy}`;
          el.textContent = STATUS_LABELS[v] || val;
          const cell = el.closest('[data-herb]');
          if (cell) cell.className = cell.className.replace(/herb-cell--\w+/, STATUS_CELL[v] || STATUS_CELL.healthy);
        } else {
          el.textContent = val;
          if (key === 'alert_count') el.classList.toggle('info-value--alert', parseInt(val) > 0);
        }
      });
    });
  };

  (function() {
    const params = new URLSearchParams(window.location.search);
    if (!params.size) return;
    const data = {};
    params.forEach((v, k) => { data[k] = v; });
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => window.injectData(data));
    } else { window.injectData(data); }
  })();
</script>
</body>
</html>
